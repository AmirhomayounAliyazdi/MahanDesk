name: Android Only Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

env:
  RUST_VERSION: "stable" 
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  VERSION: "1.4.6"
  UPLOAD_ARTIFACT: true

jobs:
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # افزودن فلاتر به این جاب برای رفع خطای flutter: not found
      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Generate Bridge
        run: |
          # افزودن skip-deps-check برای نادیده گرفتن ماژول‌های مفقود در زمان تولید کد
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/bridge_generated.dart \
            --skip-deps-check

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            flutter/lib/bridge_generated.dart
            src/bridge_generated.rs

  build-android:
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: aarch64, target: aarch64-linux-android }
          - { arch: armv7, target: armv7-linux-androideabi }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build openjdk-17-jdk-headless

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Build Rust Library (Android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.job.target }}
          cargo install cargo-ndk
          cd flutter
          if [[ "${{ matrix.job.arch }}" == "aarch64" ]]; then 
            bash ndk_arm64.sh
          else 
            bash ndk_arm.sh
          fi

      - name: Build Android APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd flutter
          sed -i "s/signingConfig signingConfigs.release/\/\/signingConfig signingConfigs.release/g" android/app/build.gradle || true
          flutter build apk --release --target-platform android-${{ matrix.job.arch == 'aarch64' && 'arm64' || 'arm' }} --split-per-abi

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: mahandesk-${{ matrix.job.arch }}-unsigned
          path: flutter/build/app/outputs/flutter-apk/*.apk
