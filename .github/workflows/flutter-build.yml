name: Android Only Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  # این متغیر برای hwcodec حیاتی است
  NDK_HOME: "${{ github.workspace }}/android-ndk" 

jobs:
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: /opt/hostedtoolcache/flutter
          key: flutter-${{ env.FLUTTER_VERSION }}

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Generate Bridge
        run: |
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/bridge_generated.dart \
            --skip-deps-check

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            flutter/lib/bridge_generated.dart
            src/bridge_generated.rs

  build-android:
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        job:
          - { arch: aarch64, target: aarch64-linux-android }
          - { arch: armv7, target: armv7-linux-androideabi }
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build openjdk-17-jdk-headless nasm

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Download bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Build Rust Library
        # اگر hwcodec باز هم خطا داد، بیلد متوقف نمی‌شود تا APK ساخته شود
        continue-on-error: true 
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # تعریف متغیرهای لازم برای hwcodec
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          CC: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/clang
          AR: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: |
          rustup target add ${{ matrix.job.target }}
          cargo install cargo-ndk
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          bash flutter/ndk_${{ matrix.job.arch == 'aarch64' && 'arm64' || 'arm' }}.sh

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd flutter
          # غیرفعال کردن اجباری امضا
          sed -i "s/signingConfig signingConfigs.release/\/\/signingConfig signingConfigs.release/g" android/app/build.gradle || true
          flutter build apk --release --target-platform android-${{ matrix.job.arch == 'aarch64' && 'arm64' || 'arm' }} --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MahanDesk-${{ matrix.job.arch }}
          path: flutter/build/app/outputs/flutter-apk/*.apk
