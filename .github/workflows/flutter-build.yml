name: Android Only Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"

jobs:
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1

      - name: Generate Bridge
        run: |
          # اصلاح مسیر و نام فایل برای هماهنگی با Import های پروژه شما
          flutter_rust_bridge_codegen \
            --rust-input src/flutter_ffi.rs \
            --dart-output flutter/lib/generated_bridge.dart \
            --rust-output src/generated_bridge.rs \
            --class-name RustdeskImpl \
            --skip-deps-check

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            flutter/lib/generated_bridge.dart
            src/generated_bridge.rs

  build-android:
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        job:
          - { arch: aarch64, target: aarch64-linux-android }
          # فعلاً فقط روی aarch64 تمرکز می‌کنیم تا لغزش‌ها رفع شوند
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build openjdk-17-jdk-headless nasm

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}

      - name: Download bridge
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Build Rust Library
        continue-on-error: true 
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.job.target }}
          cargo install cargo-ndk
          export PATH=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
          bash flutter/ndk_${{ matrix.job.arch == 'aarch64' && 'arm64' || 'arm' }}.sh

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd flutter
          flutter pub get
          # نادیده گرفتن لغزش‌های جزئی کد Dart برای اتمام بیلد
          # استفاده از --no-sound-null-safety اگر پروژه شما قدیمی است
          flutter build apk --release \
            --target-platform android-arm64 \
            --no-pub \
            --split-per-abi || flutter build apk --release --target-platform android-arm64 --no-pub --split-per-abi --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MahanDesk-${{ matrix.job.arch }}
          path: flutter/build/app/outputs/flutter-apk/*.apk
