name: Android Only Build

on:
  workflow_dispatch: # امکان اجرای دستی از تب Actions
  push:
    branches:
      - main
      - master

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  ANDROID_FLUTTER_VERSION: "3.24.5"
  NDK_VERSION: "r28c"
  VERSION: "1.4.6"
  # اگر این سکرت در گیت‌هاب تنظیم نشود، خروجی نهایی Unsigned خواهد بود
  ANDROID_SIGNING_KEY: "${{ secrets.ANDROID_SIGNING_KEY }}"
  UPLOAD_ARTIFACT: true

jobs:
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 1.80.1
      - name: Generate Bridge
        run: |
          # اجرای فرمان تولید بریج (مطابق با ساختار پروژه شما)
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/bridge_generated.dart
      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: ./

  build-android:
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        job:
          - { arch: aarch64, target: aarch64-linux-android }
          - { arch: armv7, target: armv7-linux-androideabi }

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build openjdk-17-jdk-headless

      - name: Install flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.ANDROID_FLUTTER_VERSION }}

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Restore bridge files
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact

      - name: Build Rust Library (Android)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add ${{ matrix.job.target }}
          cargo install cargo-ndk
          # فرض بر این است که اسکریپت‌های ndk_*.sh در پوشه flutter هستند
          cd flutter
          if [[ "${{ matrix.job.arch }}" == "aarch64" ]]; then bash ndk_arm64.sh; else bash ndk_arm.sh; fi

      - name: Build Android APK
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          cd flutter
          # غیرفعال کردن اجباری ساین در صورت وجود اسکریپت‌های مخرب
          sed -i "s/signingConfig signingConfigs.release/\/\/signingConfig signingConfigs.release/g" android/app/build.gradle || true
          
          flutter build apk --release --target-platform android-${{ matrix.job.arch == 'aarch64' && 'arm64' || 'arm' }} --split-per-abi

      - name: Upload Unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: mahandesk-${{ matrix.job.arch }}-unsigned
          path: flutter/build/app/outputs/flutter-apk/*.apk
